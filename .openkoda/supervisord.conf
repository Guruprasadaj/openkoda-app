[supervisord]
nodaemon=true
user=root
logfile=/openkoda/supervisord.log
pidfile=/var/run/supervisord.pid

[program:postgresql]
priority=100
user=postgres
command=/openkoda/scripts/start-postgres.sh
autostart=true
autorestart=true
startsecs=3
stopasgroup=true
killasgroup=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:mailpit]
priority=150
user=%(ENV_APP_USER)s
command=/openkoda/scripts/start-mailpit.sh
autostart=true
autorestart=true
startsecs=1
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:openkoda]
priority=200
user=%(ENV_APP_USER)s
command=/openkoda/scripts/start-openkoda.sh
directory=/app
autostart=true
autorestart=true
startsecs=5
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
